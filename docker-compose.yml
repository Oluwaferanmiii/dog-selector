services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dog_selector
      POSTGRES_USER: dog_selector
      POSTGRES_PASSWORD: dog_selector
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dog_selector -d dog_selector"]
      interval: 2s
      timeout: 5s
      retries: 30

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: "dev-secret-key"
      DJANGO_DEBUG: "1"
      POSTGRES_DB: dog_selector
      POSTGRES_USER: dog_selector
      POSTGRES_PASSWORD: dog_selector
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
  
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: